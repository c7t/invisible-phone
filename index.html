<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Invisible Phone</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

    canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      touch-action: none;
    }

    video { position: fixed; left: -200%; width: 1px; height: 1px; }

    #status {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 10px 14px;
      font: 12px/1.5 monospace;
      color: #ddd;
      background: rgba(0,0,0,0.6);
      pointer-events: none;
      transition: opacity 0.8s;
    }
    #status.hidden { opacity: 0; }

    #controls {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 12px 16px calc(env(safe-area-inset-bottom, 0px) + 12px);
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
    }
    #controls label {
      display: flex; justify-content: space-between; align-items: baseline;
      font: 11px monospace;
      color: #999;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    #gainVal { color: #ddd; font-variant-numeric: tabular-nums; }
    #gain { display: block; width: 100%; accent-color: #fff; cursor: pointer; }

    #hint {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
      transition: opacity 0.6s;
    }
    #hint.gone { opacity: 0; }
    #hint div {
      background: rgba(0,0,0,0.78);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 20px 24px;
      max-width: 290px;
      font: 13px/1.75 monospace;
      color: #bbb;
      text-align: center;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <video id="vRear"  autoplay playsinline muted></video>
  <video id="vFront" autoplay playsinline muted></video>

  <div id="status">Starting cameras…</div>

  <div id="controls">
    <label for="gain">
      Parallax gain
      <span id="gainVal">0.50</span>
    </label>
    <input type="range" id="gain" min="-2" max="2" step="0.02" value="0.5">
  </div>

  <div id="hint"><div>
    Drag to pan &nbsp;·&nbsp; Pinch to zoom<br>
    Slide to tune parallax<br><br>
    Aim at a straight edge crossing the frame. Slide until the line looks continuous.<br><br>
    Double-tap to reset.
  </div></div>

  <script type="module">
    import { FaceLandmarker, FilesetResolver }
      from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs';

    const canvas    = document.getElementById('c');
    const ctx       = canvas.getContext('2d', { alpha: false });
    const vRear     = document.getElementById('vRear');
    const vFront    = document.getElementById('vFront');
    const statusEl  = document.getElementById('status');
    const gainEl    = document.getElementById('gain');
    const gainValEl = document.getElementById('gainVal');
    const hintEl    = document.getElementById('hint');

    function setStatus(msg) { statusEl.textContent = msg; }

    // ── Canvas sizing ─────────────────────────────────────────
    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // ── Transform state ───────────────────────────────────────
    let panX = 0, panY = 0, zoom = 1, gain = 0.5;
    let eyeX = 0, eyeY = 0;

    gainEl.addEventListener('input', () => {
      gain = parseFloat(gainEl.value);
      gainValEl.textContent = gain.toFixed(2);
    });

    // ── Pointer gestures ──────────────────────────────────────
    const pts = new Map();
    let pinchD = null, lastTap = 0;

    canvas.addEventListener('pointerdown', e => {
      e.preventDefault();
      pts.set(e.pointerId, [e.clientX, e.clientY]);
      if (pts.size === 1) {
        const now = Date.now();
        if (now - lastTap < 300) { panX = panY = 0; zoom = 1; }
        lastTap = now;
      }
      if (pts.size === 2) {
        const [a, b] = [...pts.values()];
        pinchD = Math.hypot(b[0]-a[0], b[1]-a[1]);
      }
    });

    canvas.addEventListener('pointermove', e => {
      if (!pts.has(e.pointerId)) return;
      e.preventDefault();
      const prev = pts.get(e.pointerId);
      pts.set(e.pointerId, [e.clientX, e.clientY]);
      if (pts.size === 1) {
        panX += e.clientX - prev[0];
        panY += e.clientY - prev[1];
      } else if (pts.size >= 2) {
        const [a, b] = [...pts.values()];
        const d = Math.hypot(b[0]-a[0], b[1]-a[1]);
        if (pinchD) zoom = Math.max(0.2, Math.min(6, zoom * d / pinchD));
        pinchD = d;
      }
    });

    const endPtr = e => { pts.delete(e.pointerId); if (pts.size < 2) pinchD = null; };
    canvas.addEventListener('pointerup',     endPtr);
    canvas.addEventListener('pointercancel', endPtr);

    // ── Cameras ───────────────────────────────────────────────
    let rearReady = false, frontReady = false;

    async function openCamera(video, constraints) {
      const stream = await navigator.mediaDevices.getUserMedia({ video: constraints, audio: false });
      video.srcObject = stream;
      video.play();
      await new Promise(r => { video.onloadeddata = r; });
    }

    // ── Gyro: phone-rotation correction (radians, zeroed at startup) ──
    let gyroZero = null, deltaGammaRad = 0, deltaBetaRad = 0;

    window.addEventListener('deviceorientation', e => {
      if (e.gamma === null) return;
      if (!gyroZero) gyroZero = { gamma: e.gamma, beta: e.beta };
      deltaGammaRad = (e.gamma - gyroZero.gamma) * Math.PI / 180;
      deltaBetaRad  = (e.beta  - gyroZero.beta)  * Math.PI / 180;
    });

    // ── Face tracker ──────────────────────────────────────────
    let landmarker = null;

    async function initTracker() {
      const vision = await FilesetResolver.forVisionTasks(
        'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
      );
      landmarker = await FaceLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
          delegate: 'GPU',
        },
        runningMode: 'VIDEO',
        numFaces: 1,
        outputFaceBlendshapes: false,
        outputFacialTransformationMatrixes: true,
      });
    }

    // ── Main loop ─────────────────────────────────────────────
    let trackTs = 0, trackerAnnounced = false;

    function loop(ts) {
      // Face tracking (~30 fps)
      if (landmarker && frontReady && vFront.readyState >= 2) {
        if (!trackerAnnounced) {
          trackerAnnounced = true;
          setStatus('Tracking active — move your head');
          setTimeout(() => { statusEl.classList.add('hidden'); hintEl.classList.add('gone'); }, 2500);
        }
        if (ts - trackTs > 33) {
          const res = landmarker.detectForVideo(vFront, ts);
          const mat = res.facialTransformationMatrixes?.[0]?.data;
          if (mat) {
            // column-major 4×4: translation is at [12], [13], [14]
            const tx = mat[12], ty = mat[13], tz = mat[14];
            // world angle = camera-space angle + phone rotation (gyro)
            // gain slider calibrates the remaining scale (rear cam FOV / scene depth)
            const wx = Math.atan2(tx, tz) + deltaGammaRad;
            const wy = Math.atan2(ty, tz) + deltaBetaRad;
            eyeX = eyeX * 0.7 + Math.tan(wx) * 0.3;
            eyeY = eyeY * 0.7 + Math.tan(wy) * 0.3;
          } else {
            eyeX *= 0.9; eyeY *= 0.9;
          }
          trackTs = ts;
        }
      }

      // Render rear camera
      const W = canvas.width, H = canvas.height;
      if (rearReady && vRear.readyState >= 2 && vRear.videoWidth) {
        const vw = vRear.videoWidth, vh = vRear.videoHeight;
        const s  = Math.max(W / vw, H / vh) * zoom;
        const shiftX = eyeX * gain * W;
        const shiftY = eyeY * gain * H;
        ctx.drawImage(vRear,
          (W - vw * s) / 2 + panX + shiftX,
          (H - vh * s) / 2 + panY + shiftY,
          vw * s, vh * s
        );
      } else {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, W, H);
      }

      requestAnimationFrame(loop);
    }

    // ── Boot ──────────────────────────────────────────────────
    try {
      await openCamera(vRear, {
        facingMode: { exact: 'environment' },
        width: { ideal: 1920 }, height: { ideal: 1080 },
      });
      rearReady = true;
      setStatus('Loading face tracker…');
      requestAnimationFrame(loop);

      const [trackerResult, frontResult] = await Promise.allSettled([
        initTracker(),
        openCamera(vFront, {
          facingMode: { exact: 'user' },
          width: { ideal: 640 }, height: { ideal: 480 },
        }),
      ]);

      if (frontResult.status === 'fulfilled') {
        frontReady = true;
      } else {
        setStatus('Front cam: ' + frontResult.reason.message);
      }
      if (trackerResult.status === 'rejected') {
        setStatus('Tracker: ' + trackerResult.reason.message);
      }

    } catch (e) {
      setStatus('Error: ' + e.message);
    }
  </script>
</body>
</html>
