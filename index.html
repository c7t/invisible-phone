<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Invisible Phone — Debug</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #fff; font-family: monospace; }
    #status {
      padding: 10px 12px;
      font-size: 12px;
      line-height: 1.5;
      background: rgba(0,0,0,0.8);
      white-space: pre-wrap;
    }
    .line { margin-bottom: 2px; }
    .ok   { color: #4f4; }
    .err  { color: #f44; }
    .wait { color: #ff4; }
    .info { color: #adf; }
    #videos {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 4px;
    }
    .cam-wrap {
      position: relative;
    }
    .cam-label {
      position: absolute; top: 6px; left: 8px;
      background: rgba(0,0,0,0.6);
      padding: 2px 6px; border-radius: 4px;
      font-size: 11px; z-index: 1;
    }
    canvas.overlay {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
    }
    video {
      display: block;
      width: 100%;
      border-radius: 6px;
      background: #111;
    }
  </style>
</head>
<body>
  <video id="vRear" autoplay playsinline muted style="position:fixed;left:-200%;width:1px;height:1px"></video>
  <div id="status"></div>
  <div id="videos">
    <div class="cam-wrap" id="wrap-front">
      <span class="cam-label">Front — face tracking</span>
      <video id="vFront" autoplay playsinline muted></video>
      <canvas id="cvFront" class="overlay"></canvas>
    </div>
    <div class="cam-wrap" id="wrap-rear">
      <span class="cam-label">Rear — identity transform</span>
      <canvas id="cvRear"></canvas>
    </div>
  </div>

  <script type="module">
    import { FaceLandmarker, FilesetResolver, DrawingUtils }
      from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs';

    const statusEl  = document.getElementById('status');
    const vFront    = document.getElementById('vFront');
    const vRear     = document.getElementById('vRear');
    const cvFront   = document.getElementById('cvFront');
    const cvRear    = document.getElementById('cvRear');
    const ctx       = cvFront.getContext('2d');
    const rCtx      = cvRear.getContext('2d', { alpha: false });

    const lines = [];
    function log(msg, cls = '') {
      lines.push({ msg, cls });
      statusEl.innerHTML = lines.map(l =>
        `<div class="line ${l.cls}">${l.msg}</div>`
      ).join('');
    }
    function updateLast(msg, cls = '') {
      if (lines.length) { lines[lines.length-1] = { msg, cls }; }
      else lines.push({ msg, cls });
      statusEl.innerHTML = lines.map(l =>
        `<div class="line ${l.cls}">${l.msg}</div>`
      ).join('');
    }

    // ── Cameras ───────────────────────────────────────────────
    log('Opening front camera…', 'wait');
    let frontReady = false, rearReady = false;

    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { exact: 'user' }, width: { ideal: 640 }, height: { ideal: 480 } },
        audio: false,
      });
      vFront.srcObject = stream;
      await new Promise(r => { vFront.onloadeddata = r; });
      const s = vFront.srcObject.getVideoTracks()[0].getSettings();
      frontReady = true;
      updateLast(`Front: ${s.width}x${s.height} — OK`, 'ok');
    } catch (e) {
      updateLast('Front: ' + e.message, 'err');
    }

    log('Opening rear camera…', 'wait');
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { exact: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false,
      });
      vRear.srcObject = stream;
      vRear.play();
      await new Promise(r => { vRear.onloadeddata = r; });
      const s = vRear.srcObject.getVideoTracks()[0].getSettings();
      rearReady = true;
      updateLast(`Rear: ${s.width}x${s.height} — OK`, 'ok');
    } catch (e) {
      updateLast('Rear: ' + e.message, 'err');
    }

    // ── Match canvases to video element sizes ─────────────────
    function syncCanvas() {
      cvFront.width  = vFront.videoWidth  || vFront.clientWidth;
      cvFront.height = vFront.videoHeight || vFront.clientHeight;
    }
    function syncRearCanvas() {
      // Display width = full page width; height = 16:9 of that
      const W = window.innerWidth;
      const vw = vRear.videoWidth || 1280;
      const vh = vRear.videoHeight || 720;
      cvRear.style.width  = W + 'px';
      cvRear.style.height = Math.round(W * vh / vw) + 'px';
      cvRear.width  = vw;
      cvRear.height = vh;
    }
    if (frontReady) syncCanvas();
    if (rearReady) syncRearCanvas();
    window.addEventListener('resize', () => { syncCanvas(); syncRearCanvas(); });

    // ── MediaPipe ─────────────────────────────────────────────
    log('Loading MediaPipe…', 'wait');
    let landmarker = null, drawUtils = null;

    try {
      const vision = await FilesetResolver.forVisionTasks(
        'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
      );
      landmarker = await FaceLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
          delegate: 'GPU',
        },
        runningMode: 'VIDEO',
        numFaces: 1,
        outputFaceBlendshapes: false,
        outputFacialTransformationMatrixes: false,
      });
      drawUtils = new DrawingUtils(ctx);
      updateLast('MediaPipe: loaded — OK', 'ok');
    } catch (e) {
      updateLast('MediaPipe: ' + e.message, 'err');
    }

    // ── Tracking loop ─────────────────────────────────────────
    let eyeX = 0, eyeY = 0, faceDetected = false;
    let trackTs = 0, infoLine = null;

    function loop(ts) {
      // Sync canvas to video size if needed
      if (cvFront.width !== vFront.videoWidth && vFront.videoWidth) syncCanvas();

      if (landmarker && frontReady && vFront.readyState >= 2 && vFront.videoWidth) {
        if (ts - trackTs > 33) {
          const res = landmarker.detectForVideo(vFront, ts);
          ctx.clearRect(0, 0, cvFront.width, cvFront.height);

          if (res.faceLandmarks.length > 0) {
            faceDetected = true;
            const lm = res.faceLandmarks[0];

            // Draw full face mesh
            drawUtils.drawConnectors(lm, FaceLandmarker.FACE_LANDMARKS_TESSELATION,
              { color: 'rgba(255,255,255,0.08)', lineWidth: 0.5 });
            drawUtils.drawConnectors(lm, FaceLandmarker.FACE_LANDMARKS_RIGHT_EYE,
              { color: '#30f', lineWidth: 1 });
            drawUtils.drawConnectors(lm, FaceLandmarker.FACE_LANDMARKS_LEFT_EYE,
              { color: '#30f', lineWidth: 1 });
            drawUtils.drawConnectors(lm, FaceLandmarker.FACE_LANDMARKS_RIGHT_IRIS,
              { color: '#0ff', lineWidth: 1.5 });
            drawUtils.drawConnectors(lm, FaceLandmarker.FACE_LANDMARKS_LEFT_IRIS,
              { color: '#0ff', lineWidth: 1.5 });

            // Iris centers (468 = left, 473 = right — subject anatomical)
            const W = cvFront.width, H = cvFront.height;
            const lx = lm[468].x * W, ly = lm[468].y * H;
            const rx = lm[473].x * W, ry = lm[473].y * H;
            const cx = (lx + rx) / 2, cy = (ly + ry) / 2;

            ctx.fillStyle = '#ff0';
            ctx.beginPath(); ctx.arc(lx, ly, 4, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(rx, ry, 4, 0, Math.PI*2); ctx.fill();

            // Crosshair at midpoint
            ctx.strokeStyle = '#ff0'; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(cx-10, cy); ctx.lineTo(cx+10, cy); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx, cy-10); ctx.lineTo(cx, cy+10); ctx.stroke();

            // eyeX/Y normalized (centered at 0)
            const ix = (lm[468].x + lm[473].x) / 2 - 0.5;
            const iy = (lm[468].y + lm[473].y) / 2 - 0.5;
            eyeX = eyeX * 0.7 + ix * 0.3;
            eyeY = eyeY * 0.7 + iy * 0.3;

            // Label
            ctx.fillStyle = '#ff0';
            ctx.font = '11px monospace';
            ctx.fillText(`eye x:${eyeX.toFixed(3)}  y:${eyeY.toFixed(3)}`, 6, H - 8);

            if (!infoLine) infoLine = lines.length;
            if (infoLine !== null) {
              lines[infoLine] = { msg: `Face: eyeX=${eyeX.toFixed(3)}  eyeY=${eyeY.toFixed(3)}`, cls: 'info' };
              statusEl.innerHTML = lines.map(l => `<div class="line ${l.cls}">${l.msg}</div>`).join('');
            }
          } else {
            faceDetected = false;
            ctx.clearRect(0, 0, cvFront.width, cvFront.height);
            ctx.fillStyle = 'rgba(255,60,60,0.6)';
            ctx.font = '13px monospace';
            ctx.fillText('No face detected', 8, 20);
          }
          trackTs = ts;
        }
      }

      // Rear canvas — identity transform (pan=0, zoom=1, gain=0)
      if (rearReady) {
        if (cvRear.width !== vRear.videoWidth && vRear.videoWidth) syncRearCanvas();
        const W = cvRear.width, H = cvRear.height;
        const vw = vRear.videoWidth, vh = vRear.videoHeight;

        // Live diagnostics (update ~1/s)
        if (Math.floor(ts / 1000) !== Math.floor((ts - 16) / 1000)) {
          const diagIdx = lines.findIndex(l => l.msg.startsWith('rear:'));
          const diagMsg = `rear: readyState=${vRear.readyState} videoW=${vw} paused=${vRear.paused} cv=${W}x${H}`;
          if (diagIdx >= 0) lines[diagIdx] = { msg: diagMsg, cls: 'info' };
          else lines.push({ msg: diagMsg, cls: 'info' });
          statusEl.innerHTML = lines.map(l => `<div class="line ${l.cls}">${l.msg}</div>`).join('');
        }

        if (vRear.readyState >= 2 && vw) {
          const s = Math.max(W / vw, H / vh);
          rCtx.drawImage(vRear, (W - vw * s) / 2, (H - vh * s) / 2, vw * s, vh * s);
        }
      }

      requestAnimationFrame(loop);
    }

    if (landmarker) {
      log(faceDetected ? '' : 'Waiting for face…', 'wait');
      infoLine = lines.length - 1;
    }

    requestAnimationFrame(loop);
  </script>
</body>
</html>
