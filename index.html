<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Invisible Phone</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { position: fixed; inset: 0; width: 100%; height: 100%; touch-action: none; }
    video  { position: fixed; left: -200%; width: 1px; height: 1px; }
    #status {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 8px 12px; font: 11px/1.4 monospace;
      color: #aaa; background: rgba(0,0,0,0.55); pointer-events: none;
    }
    #controls {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 10px 0 calc(env(safe-area-inset-bottom,0px) + 10px);
      background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
    }
    #controls label {
      display: flex; justify-content: space-between;
      font: 11px monospace; color: #999;
      letter-spacing: .06em; text-transform: uppercase;
      margin-bottom: 4px; padding: 0 12px;
    }
    #gainVal { color: #ddd; font-variant-numeric: tabular-nums; }
    #gain { display: block; width: 100%; margin: 0; padding: 0; accent-color: #fff; cursor: pointer; }
    #hint {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; transition: opacity .6s;
    }
    #hint.gone { opacity: 0; }
    #hint div {
      background: rgba(0,0,0,.78); border: 1px solid rgba(255,255,255,.12);
      border-radius: 14px; padding: 20px 24px; max-width: 290px;
      font: 13px/1.75 monospace; color: #bbb; text-align: center;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <video id="vRear"  autoplay playsinline muted></video>
  <video id="vFront" autoplay playsinline muted></video>
  <div id="status">Starting cameras…</div>
  <div id="controls">
    <label for="gain">Parallax <span id="gainVal">-6.6</span></label>
    <input type="range" id="gain" min="-10" max="0" step="0.1" value="-6.6">
  </div>
  <div id="hint"><div>
    Drag to pan &nbsp;·&nbsp; Pinch to zoom<br>
    Slide to tune parallax<br><br>
    Aim at a straight edge crossing the frame.<br>
    Slide until the line looks continuous.<br><br>
    Double-tap to reset.
  </div></div>

  <script type="module">
    // ── Tracker Web Worker (inline module blob) ───────────────
    // Running MediaPipe in a worker keeps the render RAF unblocked.
    const TRACKER_SRC = `
import { FaceLandmarker, FilesetResolver }
  from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs';

let landmarker = null;

async function init() {
  const vision = await FilesetResolver.forVisionTasks(
    'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
  );
  const opts = {
    baseOptions: {
      modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
    },
    runningMode: 'VIDEO',
    numFaces: 1,
    outputFaceBlendshapes: false,
    outputFacialTransformationMatrixes: true,
  };
  // try GPU first; fall back to CPU if WebGL unavailable in this worker
  try {
    landmarker = await FaceLandmarker.createFromOptions(vision, { ...opts, baseOptions: { ...opts.baseOptions, delegate: 'GPU' } });
  } catch {
    landmarker = await FaceLandmarker.createFromOptions(vision, { ...opts, baseOptions: { ...opts.baseOptions, delegate: 'CPU' } });
  }
  self.postMessage({ type: 'ready' });
}

self.addEventListener('message', async e => {
  if (e.data.type === 'init') {
    await init();
  } else if (e.data.type === 'frame') {
    const { bitmap, ts } = e.data;
    if (!landmarker) { bitmap.close(); return; }
    const res = landmarker.detectForVideo(bitmap, ts);
    bitmap.close();
    const mat = res.facialTransformationMatrixes?.[0]?.data;
    if (mat) {
      self.postMessage({ type: 'result', tx: mat[12], ty: mat[13], tz: mat[14] });
    } else {
      self.postMessage({ type: 'noresult' });
    }
  }
});
`;

    const trackerWorker = new Worker(
      URL.createObjectURL(new Blob([TRACKER_SRC], { type: 'text/javascript' })),
      { type: 'module' }
    );

    // ── Elements ──────────────────────────────────────────────
    const canvas    = document.getElementById('c');
    const ctx       = canvas.getContext('2d', { alpha: false });
    const vRear     = document.getElementById('vRear');
    const vFront    = document.getElementById('vFront');
    const statusEl  = document.getElementById('status');
    const gainEl    = document.getElementById('gain');
    const gainValEl = document.getElementById('gainVal');
    const hintEl    = document.getElementById('hint');

    // ── Canvas sizing ─────────────────────────────────────────
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    // ── State ─────────────────────────────────────────────────
    let zoom = 3;
    let panX = 0.4  * canvas.width;
    let panY = -1.0 * canvas.height;
    let gain = -6.6;
    let eyeX = 0, eyeY = 0;
    let tzSmooth = null, tzRef = null;
    let workerReady = false, workerBusy = false;
    let rearReady = false, frontReady = false;
    let trackerAnnounced = false;

    // ── Worker result handler ─────────────────────────────────
    trackerWorker.addEventListener('message', e => {
      if (e.data.type === 'ready') {
        workerReady = true;
      } else if (e.data.type === 'result') {
        if (!trackerAnnounced) { trackerAnnounced = true; hintEl.classList.add('gone'); }
        const { tx, ty, tz } = e.data;
        const d = Math.abs(tz) || 1;
        eyeX = eyeX * 0.7 + (tx / d) * 0.3;
        eyeY = eyeY * 0.7 + (ty / d) * 0.3;
        tzSmooth = tzSmooth === null ? d : tzSmooth * 0.9 + d * 0.1;
        if (tzRef === null) tzRef = tzSmooth;
        workerBusy = false;
      } else if (e.data.type === 'noresult') {
        eyeX *= 0.9; eyeY *= 0.9;
        workerBusy = false;
      }
    });

    trackerWorker.postMessage({ type: 'init' });
    trackerWorker.addEventListener('error', e => {
      statusEl.textContent = 'Worker error: ' + (e.message || 'unknown — check console');
    });

    // ── Gain slider ───────────────────────────────────────────
    gainEl.addEventListener('input', () => {
      const v = parseFloat(gainEl.value);
      panX -= eyeX * (v - gain) * canvas.width;
      panY -= eyeY * (v - gain) * canvas.height;
      gain = v;
      gainValEl.textContent = v.toFixed(1);
    });

    // ── Pointer gestures ──────────────────────────────────────
    const pts = new Map();
    let pinchD = null, lastTap = 0;

    canvas.addEventListener('pointerdown', e => {
      e.preventDefault();
      pts.set(e.pointerId, [e.clientX, e.clientY]);
      if (pts.size === 1) {
        const now = Date.now();
        if (now - lastTap < 300) { panX = panY = 0; zoom = 1; }
        lastTap = now;
      }
      if (pts.size === 2) {
        const [a, b] = [...pts.values()];
        pinchD = Math.hypot(b[0]-a[0], b[1]-a[1]);
      }
    });
    canvas.addEventListener('pointermove', e => {
      if (!pts.has(e.pointerId)) return;
      e.preventDefault();
      const prev = pts.get(e.pointerId);
      pts.set(e.pointerId, [e.clientX, e.clientY]);
      if (pts.size === 1) {
        panX += e.clientX - prev[0];
        panY += e.clientY - prev[1];
      } else if (pts.size >= 2) {
        const [a, b] = [...pts.values()];
        const d = Math.hypot(b[0]-a[0], b[1]-a[1]);
        if (pinchD) zoom = Math.max(0.2, Math.min(6, zoom * d / pinchD));
        pinchD = d;
      }
    });
    const endPtr = e => { pts.delete(e.pointerId); if (pts.size < 2) pinchD = null; };
    canvas.addEventListener('pointerup',     endPtr);
    canvas.addEventListener('pointercancel', endPtr);

    // ── Cameras ───────────────────────────────────────────────
    async function openCamera(video, constraints) {
      const stream = await navigator.mediaDevices.getUserMedia({ video: constraints, audio: false });
      video.srcObject = stream;
      video.play();
      const track = stream.getVideoTracks()[0];
      const caps = track.getCapabilities?.();
      if (caps?.zoom) {
        try { await track.applyConstraints({ advanced: [{ zoom: caps.zoom.min }] }); } catch {}
      }
      await new Promise(r => { video.onloadeddata = r; });
    }

    // ── Front-camera tracking via requestVideoFrameCallback ───
    function trackFrame(now) {
      if (workerReady && !workerBusy && vFront.readyState >= 2) {
        workerBusy = true;
        createImageBitmap(vFront).then(bitmap => {
          trackerWorker.postMessage({ type: 'frame', bitmap, ts: now }, [bitmap]);
        });
      }
      vFront.requestVideoFrameCallback(trackFrame);
    }

    // ── Render loop ───────────────────────────────────────────
    function loop() {
      const W = canvas.width, H = canvas.height;
      if (rearReady && vRear.readyState >= 2 && vRear.videoWidth) {
        const vw = vRear.videoWidth, vh = vRear.videoHeight;
        const depthZoom = (tzRef && tzSmooth) ? tzSmooth / tzRef : 1;
        const s = Math.max(W / vw, H / vh) * zoom * depthZoom;
        ctx.drawImage(vRear,
          (W - vw * s) / 2 + panX + eyeX * gain * W,
          (H - vh * s) / 2 + panY + eyeY * gain * H,
          vw * s, vh * s
        );
      } else {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, W, H);
      }
      requestAnimationFrame(loop);
    }

    // ── Parameter readout (2×/s) ──────────────────────────────
    setInterval(() => {
      if (!trackerAnnounced) return;
      const W = canvas.width, H = canvas.height;
      statusEl.textContent =
        `gain ${gain.toFixed(1)}  zoom ${zoom.toFixed(3)}` +
        `  pan ${(panX/W).toFixed(4)},${(panY/H).toFixed(4)}`;
    }, 500);

    // ── Boot ──────────────────────────────────────────────────
    // Rear cam, front cam, and worker all initialise independently.
    // trackFrame checks workerReady before sending frames, so the
    // RVCB loop can start as soon as the front cam is ready.
    try {
      await openCamera(vRear, {
        facingMode: { exact: 'environment' },
        width: { ideal: 1280 }, height: { ideal: 720 },
      });
      rearReady = true;
      statusEl.textContent = 'Loading face tracker…';
      requestAnimationFrame(loop);
    } catch (e) {
      statusEl.textContent = 'Rear cam error: ' + e.message;
    }

    openCamera(vFront, {
      facingMode: { exact: 'user' },
      width: { ideal: 640 }, height: { ideal: 480 },
    }).then(() => {
      frontReady = true;
      vFront.requestVideoFrameCallback(trackFrame);
    }).catch(e => {
      statusEl.textContent = 'Front cam: ' + e.message;
    });
  </script>
</body>
</html>
